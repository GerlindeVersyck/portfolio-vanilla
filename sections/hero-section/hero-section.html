<section id="home" class="hero">
  <div class="section-anchor" aria-hidden="true"></div>
  <div class="hero-background">
    <div class="hero-photo-layer hero-photo-blur"></div>

    <div class="hero-photo-layer hero-photo-main">
      <img
        src=""
        alt="Profile portrait"
        class="hero-portrait"
        data-hero-image="portrait"
        data-i18n-alt="hero.avatarAlt"
      />
    </div>
  </div>

  <div class="hero-content">
    <div class="hero-stage hero-stage-title">
      <h1 class="hero-title" data-i18n="hero.title"></h1>
    </div>

    <div class="hero-stage hero-stage-subtitle">
      <p class="hero-subtitle">
        <span class="hero-name" data-i18n="hero.name"></span>
      </p>
    </div>

    <div class="hero-stage hero-stage-social">
      <div class="social-links">
        <a
          href=""
          target="_blank"
          rel="noopener noreferrer"
          class="social-btn"
          data-social-link="github"
        >
          <i class="fab fa-github" aria-hidden="true"></i>
          <span data-enum="socials.links.0"></span>
        </a>

        <a
          href=""
          target="_blank"
          rel="noopener noreferrer"
          class="social-btn"
          data-social-link="linkedin"
        >
          <i class="fab fa-linkedin" aria-hidden="true"></i>
          <span data-enum="socials.links.1"></span>
        </a>

        <a href="" class="social-btn" data-social-link="email">
          <i class="fas fa-envelope" aria-hidden="true"></i>
          <span data-enum="socials.links.2"></span>
        </a>
      </div>
    </div>
  </div>
</section>
