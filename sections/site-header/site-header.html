<header id="header" class="header">
  <nav class="navbar">
    <div class="nav-container">
      <div class="logo" data-i18n="header.logo"></div>

      <ul class="nav-menu">
        <li>
          <a href="#home" class="nav-link" data-i18n="header.nav.0"></a>
        </li>

        <li>
          <a href="#about" class="nav-link" data-i18n="header.nav.1"></a>
        </li>

        <li>
          <a href="#skills" class="nav-link" data-i18n="header.nav.2"></a>
        </li>

        <li>
          <a href="#languages" class="nav-link" data-i18n="header.nav.3"></a>
        </li>

        <li>
          <a href="#projects" class="nav-link" data-i18n="header.nav.4"></a>
        </li>

        <li>
          <a href="#contact" class="nav-link" data-i18n="header.nav.5"></a>
        </li>
      </ul>

      <div class="language-switcher" data-current-lang="en">
        <button
          class="lang-toggle"
          type="button"
          aria-haspopup="true"
          aria-expanded="false"
          data-i18n-tooltip="header.languageSwitcher.title"
          data-i18n-aria-label="header.languageSwitcher.ariaLabel"
        >
          <i class="fa-solid fa-globe" aria-hidden="true"></i>
        </button>

        <div class="lang-dropdown" role="menu">
          <button type="button" class="lang-option" data-lang="nl">
            <span class="lang-option-flag lang-flag--nl" aria-hidden="true"></span>

            <span class="lang-option-text" data-i18n="languages.switcher.nl"></span>
          </button>

          <button type="button" class="lang-option" data-lang="en">
            <span class="lang-option-flag lang-flag--gb" aria-hidden="true"></span>

            <span class="lang-option-text" data-i18n="languages.switcher.en"></span>
          </button>

          <button type="button" class="lang-option" data-lang="fr">
            <span class="lang-option-flag lang-flag--fr" aria-hidden="true"></span>

            <span class="lang-option-text" data-i18n="languages.switcher.fr"></span>
          </button>

          <button type="button" class="lang-option" data-lang="es">
            <span class="lang-option-flag lang-flag--es" aria-hidden="true"></span>

            <span class="lang-option-text" data-i18n="languages.switcher.es"></span>
          </button>
        </div>
      </div>
    </div>
  </nav>
</header>
