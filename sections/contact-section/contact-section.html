<section id="contact" class="contact">
  <div class="section-anchor" aria-hidden="true"></div>
  <div class="container contact-content">
    <h2 class="section-title" data-i18n="contact.title"></h2>
    <p class="contact-intro" data-i18n="contact.intro"></p>

    <button
      type="button"
      class="contact-open-btn"
      id="contact-open-btn"
      data-i18n="contact.openButton"
      aria-haspopup="dialog"
      aria-controls="contact-modal"
      aria-expanded="false"
    ></button>
  </div>

  <div class="contact-modal" id="contact-modal" hidden aria-hidden="true">
    <div class="contact-modal__overlay" data-contact-close></div>

    <div
      class="contact-modal__dialog"
      role="dialog"
      aria-modal="true"
      aria-labelledby="contact-modal-title"
    >
      <button
        type="button"
        class="contact-modal__close"
        data-contact-close
        data-i18n-aria-label="contact.closeLabel"
      >
        <span aria-hidden="true">&times;</span>
      </button>

      <div id="contact-form-view">
        <h3 class="contact-modal__title" id="contact-modal-title" data-i18n="contact.title"></h3>

        <form id="contact-form" class="contact-form" novalidate>
          <div class="form-group">
            <label for="name" data-i18n="contact.nameLabel"></label>

            <input
              type="text"
              id="name"
              name="name"
              required
              aria-required="true"
              data-i18n-placeholder="contact.namePlaceholder"
            />

            <span class="error-message" id="name-error"></span>
          </div>

          <div class="form-group">
            <label for="email" data-i18n="contact.emailLabel"></label>

            <input
              type="email"
              id="email"
              name="email"
              required
              aria-required="true"
              data-i18n-placeholder="contact.emailPlaceholder"
            />

            <span class="error-message" id="email-error"></span>
          </div>

          <div class="form-group">
            <label for="message" data-i18n="contact.messageLabel"></label>

            <textarea
              id="message"
              name="message"
              rows="5"
              required
              aria-required="true"
              data-i18n-placeholder="contact.messagePlaceholder"
            ></textarea>

            <span class="error-message" id="message-error"></span>
          </div>

          <div
            class="form-feedback form-feedback--error"
            id="form-feedback"
            role="alert"
            aria-live="polite"
          ></div>

          <button
            type="submit"
            class="submit-btn"
            data-i18n="contact.submit"
            data-i18n-tooltip="contact.submitTooltip"
            disabled
          ></button>
        </form>
      </div>

      <div class="contact-success" id="contact-success-view" hidden>
        <div class="contact-success__icon" aria-hidden="true">✓</div>
        <h3 class="contact-success__title" id="contact-success-title"></h3>
        <p class="contact-success__message" id="contact-success-message"></p>

        <button
          type="button"
          class="contact-success__button"
          id="contact-success-close-btn"
          data-i18n="contact.successCloseButton"
        ></button>
      </div>
    </div>
  </div>
</section>
