<section id="about" class="about">
  <div class="section-anchor" aria-hidden="true"></div>
  <div class="container about-layout">
    <div class="about-top-phases phase-1">
      <div class="about-top-sticky phase-1-sticky">
        <div class="about-top-phases phase-2">
          <div class="about-top-sticky phase-2-sticky">
            <div class="about-top-grid">
              <div class="about-text">
                <h2 class="section-title" data-i18n="about.title"></h2>
                <p data-i18n="about.paragraphs.0"></p>
                <p data-i18n="about.paragraphs.1"></p>
                <p data-i18n="about.paragraphs.2"></p>
              </div>

              <div class="about-image-vertical parallax-frame">
                <div class="parallax-image" data-about-image="vertical" aria-hidden="true"></div>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>

    <div class="about-bottom-phases phase-3">
      <div class="about-bottom-sticky phase-3-sticky">
        <div class="about-bottom-phases phase-4">
          <div class="about-bottom-sticky phase-4-sticky">
            <div class="about-image-horizontal parallax-frame">
              <div class="parallax-image" data-about-image="horizontal" aria-hidden="true"></div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
</section>
